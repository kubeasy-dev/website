name: Sync OpenAPI spec to CLI

on:
  push:
    branches: [main]
    paths:
      - 'schemas/cli-api.ts'
      - 'lib/openapi.ts'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout website
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '24.14.0'

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate OpenAPI spec
        run: pnpm openapi:generate

      - name: Generate GitHub App token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Dispatch to CLI repo
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          SPEC_B64=$(base64 -w 0 openapi.json)

          gh api repos/kubeasy-dev/kubeasy-cli/dispatches \
            -f event_type=openapi-spec-updated \
            -f "client_payload[spec_base64]=$SPEC_B64" \
            -f "client_payload[source_sha]=${{ github.sha }}"
